name: friendzone
services:
  postgres:
    image: postgres:15-alpine
    container_name: friendzone_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: friendzone_db
      POSTGRES_USER: friendzone_user
      POSTGRES_PASSWORD: friendzone_password
    ports:
      - "5433:5432"
    volumes:
      - friendzone_postgres_data:/var/lib/postgresql/data
    networks:
      - friendzone_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendzone_user -d friendzone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: friendzone_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLASK_APP: backend.app
      FLASK_DEBUG: "1"
      SECRET_KEY: friendzone-super-secret-key-for-docker-development
      JWT_SECRET_KEY: friendzone-jwt-secret-key-minimum-32-character-docker
      DATABASE_URL: postgresql://friendzone_user:friendzone_password@postgres:5432/friendzone_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "5001:5001"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./backend/uploads:/app/backend/uploads
    networks:
      - friendzone_network

  frontend:
    image: nginx:alpine
    container_name: friendzone_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - friendzone_network

volumes:
  friendzone_postgres_data:

networks:
  friendzone_network:
    driver: bridge